services:
  backend:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_PATH: /app/data/db.sqlite
      ORIGIN: ${FRONTEND_URL:-http://localhost}
    expose:
      - "3000"
    volumes:
      - db_data:/app/data
    deploy:
      resources:
        limits:
          memory: 300M

  frontend:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 50M

volumes:
  db_data:
