services:
  backend:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_PATH: /app/data/db.sqlite
      ORIGIN: ${FRONTEND_URL:-http://localhost}
    volumes:
      - db_data:/app/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 300M

  frontend:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - internal
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 50M

volumes:
  db_data:

networks:
  internal:
    driver: bridge
